name: Live-Ergebnisse aktualisieren

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 20-23 6 3 *'
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 17-23 8 3 *'
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 6-20 9 3 *'
  
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ergebnisse abrufen
        run: python3 scripts/scrape.py docs/live/data

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/live/data/
          if git diff --staged --quiet; then
            echo "Keine Änderungen – Daten unverändert."
          else
            git commit -m "chore: Live-Ergebnisse $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
