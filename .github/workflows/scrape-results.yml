name: Live-Ergebnisse aktualisieren

on:
  schedule:
    # Alle 5 Minuten am Wahltag (8. März 2026) zwischen 17:00 und 23:59 UTC
    # (entspricht 18:00–00:59 MEZ – Wahllokale schließen um 18:00 Uhr)
    - cron: '*/5 17-23 8 3 *'
  # Auch manuell auslösbar
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ergebnisse abrufen
        run: python3 scripts/scrape.py docs/live/data

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/live/data/
          if git diff --staged --quiet; then
            echo "Keine Änderungen – Daten unverändert."
          else
            git commit -m "chore: Live-Ergebnisse $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
