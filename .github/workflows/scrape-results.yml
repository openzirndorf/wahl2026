name: Live-Ergebnisse aktualisieren

on:
  schedule:
    # 6. März: Testlauf 21:00–23:59 UTC (= 22:00–00:59 MEZ)
    - cron: '*/5 21-23 6 3 *'
    # 8. März: alle 5 Minuten ab 17:00 UTC (= 18:00 MEZ, Schließung Wahllokale)
    - cron: '*/5 17-23 8 3 *'
    # 9. März: alle 5 Minuten 6:00–20:00 UTC (= 7:00–21:00 MEZ, Nachwahl-Berichterstattung)
    - cron: '*/5 6-20 9 3 *'
  # Auch manuell auslösbar
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ergebnisse abrufen
        run: python3 scripts/scrape.py docs/live/data

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/live/data/
          if git diff --staged --quiet; then
            echo "Keine Änderungen – Daten unverändert."
          else
            git commit -m "chore: Live-Ergebnisse $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
